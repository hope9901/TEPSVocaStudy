name: TEPSVocaStudy
options:
  bundleIdPrefix: com.hope9901
  deploymentTarget:
    iOS: "17.0"
targets:
  TEPSVocaStudy:
    type: application
    platform: iOS
    sources:
      - path: TEPSVocaStudyApp.swift
      - path: Models
      - path: Views
      - path: ViewModels
      - path: Services
      - path: Database/v85_20260312T133124Z.db
        buildPhase: resources
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hope9901.TEPSVocaStudy
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: TEPS Voca
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: 1
        CODE_SIGN_STYLE: Automatic
